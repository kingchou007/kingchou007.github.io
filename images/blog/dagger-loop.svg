<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">DAgger algorithm steps</title>
  <desc id="desc">A simple four-step DAgger diagram: train a policy, roll it out, ask the expert for labels, and aggregate the labels into the dataset.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="7.4" refY="4.5" orient="auto">
      <path d="M1.5,1.5 L7.4,4.5 L1.5,7.5 Z" fill="#146ebe" />
    </marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="7.4" refY="4.5" orient="auto">
      <path d="M1.5,1.5 L7.4,4.5 L1.5,7.5 Z" fill="#ff9900" />
    </marker>
    <style>
      .bg { fill: #fff; }
      .title { fill: #150c21; font: 600 32px Asap, Arial, sans-serif; }
      .subtitle { fill: #6a727a; font: 400 19px Asap, Arial, sans-serif; }
      .step-title { fill: #150c21; font: 600 30px Asap, Arial, sans-serif; }
      .step-body { fill: #6a727a; font: 400 21px Asap, Arial, sans-serif; }
      .small { fill: #8d98a3; font: 400 18px Asap, Arial, sans-serif; }
      .text-bg { fill: #fff; }
      .num { fill: #150c21; font: 700 20px Asap, Arial, sans-serif; }
      .num-blue { fill: #eaf4ff; stroke: #146ebe; stroke-width: 1.8; }
      .num-orange { fill: #fff4df; stroke: #ff9900; stroke-width: 1.8; }
      .arrow { fill: none; stroke: #146ebe; stroke-width: 2.6; stroke-linecap: round; marker-end: url(#arrow-blue); }
      .arrow-orange { fill: none; stroke: #ff9900; stroke-width: 2.6; stroke-linecap: round; marker-end: url(#arrow-orange); }
      .repeat { fill: none; stroke: #cbd6e2; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 7 8; marker-end: url(#arrow-blue); }
      .baseline { stroke: #eef2f5; stroke-width: 2; }
      .dot-blue { fill: #146ebe; }
      .dot-orange { fill: #ff9900; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="360" />
  <text class="title" x="78" y="58">DAgger in one loop</text>
  <text class="subtitle" x="78" y="92">Train on the current dataset, visit learner states, ask the expert, then add those labels back.</text>

  <line class="baseline" x1="142" y1="212" x2="1054" y2="212" />

  <g transform="translate(92 128)">
    <circle class="num-blue" cx="48" cy="84" r="23" />
    <text class="num" x="42" y="91">1</text>
    <text class="step-title" x="94" y="66">Train</text>
    <text class="step-body" x="94" y="108">policy on data</text>
  </g>

  <path class="arrow" d="M310 212 H382" />

  <g transform="translate(386 128)">
    <circle class="num-orange" cx="48" cy="84" r="23" />
    <text class="num" x="42" y="91">2</text>
    <text class="step-title" x="94" y="66">Roll out</text>
    <text class="step-body" x="94" y="108">robot policy</text>
  </g>

  <path class="arrow-orange" d="M616 212 H674" />

  <g transform="translate(680 128)">
    <circle class="num-orange" cx="48" cy="84" r="23" />
    <text class="num" x="42" y="91">3</text>
    <text class="step-title" x="94" y="66">Label</text>
    <text class="step-body" x="94" y="108">with expert</text>
  </g>

  <path class="arrow-orange" d="M860 212 H904" />

  <g transform="translate(910 128)">
    <circle class="num-blue" cx="48" cy="84" r="23" />
    <text class="num" x="42" y="91">4</text>
    <text class="step-title" x="94" y="66">Aggregate</text>
    <text class="step-body" x="94" y="108">new labels</text>
  </g>

  <path class="repeat" d="M1030 296 C812 340, 416 340, 158 296" />
  <rect class="text-bg" x="462" y="298" width="276" height="28" rx="10" />
  <text class="small" x="492" y="318">repeat with the larger dataset</text>
</svg>
